model:
  name: "google/gemma-3-4b-it"
  model_type: "gemma"

datasets:
  # yor_Latn --> eng_Latn
  - name: "FloresPlusDataset"
    dataset_name_or_path: "openlanguagedata/flores_plus"
    split: "devtest"
    num_samples: -1
    source_language: "yor_Latn"
    target_language: "eng_Latn"
    output_file: "baseline/flores_plus/gemma-3-4b-it_flores_plus_yor_latn_eng_latn.json"

  # ibo_Latn --> eng_Latn
  - name: "FloresPlusDataset"
    dataset_name_or_path: "openlanguagedata/flores_plus"
    split: "devtest"
    num_samples: -1
    source_language: "ibo_Latn"
    target_language: "eng_Latn"
    output_file: "baseline/flores_plus/gemma-3-4b-it_flores_plus_ibo_latn_eng_latn.json"

  # hau_Latn --> eng_Latn
  - name: "FloresPlusDataset"
    dataset_name_or_path: "openlanguagedata/flores_plus"
    split: "devtest"
    num_samples: -1
